# ThermalAI - Configuration (TOML Format)
# Device: Generic / Universal
# Edit values here; changes take effect after restarting the daemon.

temp_cool = 42
temp_warm = 48
temp_hot = 58
temp_powersave = 68
temp_critical = 75

poll_interval = 2
game_poll_interval = 1
temp_history_size = 10
prediction_window = 5
policy_debounce_sec = 10

log_level = "INFO"
log_rotate_mb = 5

gpu_gaming_threshold = 20
pkg_cache_ttl = 5
proc_scan_interval = 3
game_latch_sec = 45
gaming_score_boost = 35

# Experimental: enables a frame-timing-aware CPU frequency governor during
# active gaming, using real per-frame data (via dumpsys) where available and
# falling back to CPU load otherwise. Enabled by default as of v3.1.0-beta.
adaptive_governor_enabled = true

# Logs detailed battery/power statistics (temperature, drain rate, screen-on/off
# and deep-sleep/awake time) to a separate thermalai_battery.log file, for
# future debugging. Pure observability - does not affect device behavior.
# On by default.
battery_stats_enabled = true

# Minimum interval between two consecutive actuation bursts (governor /
# cpuset / GPU rewrites). Kills sub-second thrash after wake / game entry.
min_actuation_interval_ms = 1500

# Master off-switch for /proc/sys/net/ipv4/tcp_* writes. Off by default —
# TCP writes were the source of visible connectivity regressions in v3.1.0.
touch_network_stack = false

# Congestion control installed while gaming; "kernel_default" keeps the
# kernel's own pick (best for carrier NAT / captive portals).
tcp_congestion_control_gaming = "kernel_default"

# Number of consecutive unclean daemon exits before the next boot enters
# safe mode (disable_tweaks forced true; telemetry-only).
safe_mode_after_crashes = 2

# Watchdog failure count above which we escalate to a full snapshot restore.
watchdog_stall_threshold = 5

